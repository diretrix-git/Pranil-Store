# MarketHub — Nginx Reverse Proxy + Load Balancer
# Place this file at /etc/nginx/sites-available/markethub
# Then: sudo ln -s /etc/nginx/sites-available/markethub /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

# ── Upstream (load balancing across Node.js instances) ────────────────────────
# For a single server, keep one entry. Add more for horizontal scaling.
# PM2 cluster mode: run `pm2 start dist/server.js -i max` to spawn one process per CPU core,
# each listening on a different port (5000, 5001, 5002...) or use a Unix socket.

upstream markethub_api {
    least_conn;                          # Route to least-busy instance
    server 127.0.0.1:5000;
    # server 127.0.0.1:5001;            # Uncomment when scaling horizontally
    # server 127.0.0.1:5002;
    keepalive 32;                        # Keep connections warm
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — use Certbot: sudo certbot --nginx -d yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    client_max_body_size 15M;            # Allow product image uploads

    # ── React frontend (static files) ─────────────────────────────────────────
    root /var/www/markethub/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html; # SPA fallback
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy → Node.js ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://markethub_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";   # WebSocket support
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Socket.io ─────────────────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://markethub_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }
}
