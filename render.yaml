services:
  # Backend API
  - type: web
    name: markethub-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Add all other env vars in Render Dashboard

  # Frontend (Static Site)
  - type: web
    name: markethub-client
    runtime: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
      # Add VITE_API_URL and VITE_CLERK_PUBLISHABLE_KEY in Render Dashboard
